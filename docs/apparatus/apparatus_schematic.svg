<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 560" font-family="Helvetica, Arial, sans-serif">
  <!-- The 2025 5S->6S bench, as established in APPARATUS.md (hand-drawn schematic,
       2026-07-24). Colors: 532 nm pump #008300, 993 nm beam #e34948,
       795 nm fluorescence #2a78d6 (validated trio; every path also labeled). -->
  <rect width="1240" height="560" fill="#fcfcfb"/>

  <!-- ======================= main beam axis y=310 ======================= -->
  <!-- Verdi -->
  <rect x="30" y="272" width="130" height="76" rx="6" fill="#ffffff" stroke="#2b2b2a" stroke-width="1.5"/>
  <text x="95" y="303" text-anchor="middle" font-size="14" fill="#2b2b2a" font-weight="bold">Coherent</text>
  <text x="95" y="322" text-anchor="middle" font-size="14" fill="#2b2b2a" font-weight="bold">Verdi V-18</text>
  <text x="95" y="340" text-anchor="middle" font-size="11" fill="#6b6b69">18.50 W · 532 nm</text>

  <!-- pump arrow -->
  <line x1="160" y1="310" x2="204" y2="310" stroke="#008300" stroke-width="6"/>
  <polygon points="204,303 218,310 204,317" fill="#008300"/>
  <text x="188" y="294" text-anchor="middle" font-size="11" fill="#008300" font-weight="bold">532 nm</text>

  <!-- SolsTiS -->
  <rect x="220" y="258" width="160" height="104" rx="6" fill="#ffffff" stroke="#2b2b2a" stroke-width="1.5"/>
  <text x="300" y="284" text-anchor="middle" font-size="14" fill="#2b2b2a" font-weight="bold">M Squared SolsTiS</text>
  <text x="300" y="303" text-anchor="middle" font-size="13" fill="#2b2b2a">Ti:Sapph · 993 nm</text>
  <text x="300" y="322" text-anchor="middle" font-size="11" fill="#6b6b69">cavity-triangular scan</text>
  <text x="300" y="345" text-anchor="middle" font-size="11" fill="#6b6b69">etalon ✓ · ref-cav ✓ · ECD ✗</text>

  <!-- 993 beam to EOM -->
  <line x1="380" y1="310" x2="470" y2="310" stroke="#e34948" stroke-width="2.5"/>
  <text x="449" y="296" text-anchor="middle" font-size="11" fill="#e34948" font-weight="bold">993 nm</text>

  <!-- wavemeter pickoff -->
  <line x1="412" y1="318" x2="428" y2="302" stroke="#2b2b2a" stroke-width="2"/>
  <line x1="420" y1="310" x2="420" y2="196" stroke="#e34948" stroke-width="1.2" stroke-dasharray="3 3"/>
  <rect x="345" y="140" width="150" height="56" rx="6" fill="#ffffff" stroke="#2b2b2a" stroke-width="1.5"/>
  <text x="420" y="163" text-anchor="middle" font-size="13" fill="#2b2b2a" font-weight="bold">HighFinesse WS-8</text>
  <text x="420" y="182" text-anchor="middle" font-size="11" fill="#6b6b69">wavemeter (fibre pickoff)</text>

  <!-- EOM -->
  <rect x="470" y="278" width="120" height="64" rx="6" fill="#ffffff" stroke="#2b2b2a" stroke-width="1.5"/>
  <text x="530" y="303" text-anchor="middle" font-size="14" fill="#2b2b2a" font-weight="bold">EOM</text>
  <text x="530" y="322" text-anchor="middle" font-size="11" fill="#6b6b69">12.5 MHz resonant</text>
  <text x="530" y="360" text-anchor="middle" font-size="11" fill="#6b6b69">AFG31021 · 12.500 000 000 0 MHz · 10 Vpp</text>

  <!-- beam to L1 -->
  <line x1="590" y1="310" x2="648" y2="310" stroke="#e34948" stroke-width="2.5"/>

  <!-- L1 -->
  <ellipse cx="656" cy="310" rx="7" ry="30" fill="#ffffff" stroke="#2b2b2a" stroke-width="1.5"/>
  <text x="656" y="264" text-anchor="middle" font-size="11" fill="#6b6b69">L1 · f = 150 mm</text>

  <!-- converging beam into cell, waist, diverging out -->
  <polygon points="663,296 663,324 775,310" fill="#e34948" opacity="0.8"/>
  <polygon points="775,310 887,296 887,324" fill="#e34948" opacity="0.8"/>
  <circle cx="775" cy="310" r="2.6" fill="#2b2b2a"/>
  <text x="775" y="336" text-anchor="middle" font-size="11" fill="#2b2b2a">w₀ ≈ 50 µm</text>

  <!-- cell -->
  <rect x="695" y="252" width="160" height="106" rx="10" fill="none" stroke="#2b2b2a" stroke-width="1.5"/>
  <text x="775" y="243" text-anchor="middle" font-size="13" fill="#2b2b2a" font-weight="bold">Rb cell · two-zone oven</text>
  <text x="775" y="374" text-anchor="middle" font-size="11" fill="#6b6b69">70–130 °C · foil-wrapped · N(T) from the cold point</text>

  <!-- L2 -->
  <ellipse cx="906" cy="310" rx="7" ry="30" fill="#ffffff" stroke="#2b2b2a" stroke-width="1.5"/>
  <text x="906" y="264" text-anchor="middle" font-size="11" fill="#6b6b69">L2 · f = 150 mm</text>

  <!-- beam to mirror -->
  <line x1="913" y1="310" x2="990" y2="310" stroke="#e34948" stroke-width="2.5"/>

  <!-- flat mirror -->
  <rect x="990" y="278" width="8" height="64" fill="#2b2b2a"/>
  <text x="1002" y="296" font-size="11" fill="#6b6b69">flat mirror</text>
  <text x="1002" y="311" font-size="11" fill="#6b6b69">self-imaging</text>
  <text x="1002" y="326" font-size="11" fill="#6b6b69">retro (ρ ≈ 1)</text>

  <!-- return beam, dashed, slightly above -->
  <line x1="988" y1="298" x2="668" y2="298" stroke="#e34948" stroke-width="1.6" stroke-dasharray="6 4"/>
  <polygon points="668,293 656,298 668,303" fill="#e34948"/>
  <text x="960" y="222" text-anchor="middle" font-size="11" fill="#e34948">return beam → standing wave in the cell</text>
  <line x1="955" y1="228" x2="940" y2="294" stroke="#c9c9c6" stroke-width="0.8"/>

  <!-- fluorescence up to PMT -->
  <path d="M 775 252 q -6 -14 0 -28 q 6 -14 0 -28 q -6 -14 0 -26" fill="none" stroke="#2a78d6" stroke-width="2.2"/>
  <polygon points="768,172 775,158 782,172" fill="#2a78d6"/>
  <text x="700" y="205" text-anchor="end" font-size="11" fill="#2a78d6" font-weight="bold">795 nm fluorescence</text>

  <!-- PMT -->
  <rect x="700" y="96" width="150" height="62" rx="6" fill="#ffffff" stroke="#2b2b2a" stroke-width="1.5"/>
  <text x="775" y="119" text-anchor="middle" font-size="13" fill="#2b2b2a" font-weight="bold">Hamamatsu R636-10</text>
  <text x="775" y="136" text-anchor="middle" font-size="11" fill="#6b6b69">side-on PMT · PXT1/M housing</text>
  <text x="775" y="151" text-anchor="middle" font-size="11" fill="#6b6b69">795 nm filter · landscape</text>

  <!-- scope -->
  <rect x="1000" y="430" width="200" height="76" rx="6" fill="#ffffff" stroke="#2b2b2a" stroke-width="1.5"/>
  <text x="1100" y="456" text-anchor="middle" font-size="13" fill="#2b2b2a" font-weight="bold">Keysight DSO-X 3054A</text>
  <text x="1100" y="474" text-anchor="middle" font-size="11" fill="#6b6b69">ch1 ramp monitor · ch2 PMT</text>
  <text x="1100" y="491" text-anchor="middle" font-size="11" fill="#6b6b69">2 000 pts · 1 s up-ramp · CSV</text>

  <!-- signal lines to scope -->
  <path d="M 850 127 H 1080 V 430" fill="none" stroke="#a9a9a5" stroke-width="1.4"/>
  <text x="1088" y="150" font-size="10.5" fill="#6b6b69">ch2 — PMT signal</text>
  <path d="M 300 362 V 520 H 1030 V 506" fill="none" stroke="#a9a9a5" stroke-width="1.4"/>
  <text x="330" y="512" font-size="10.5" fill="#6b6b69">ch1 — scan-ramp monitor</text>

</svg>
