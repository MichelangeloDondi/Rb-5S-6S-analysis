# CI: run the full pytest battery on every push/PR.
#
# THREE jobs, not one (fix, 2026-07-11): the original single
# latest-deps job silently installed numpy 2.x while pyproject declared
# numpy>=1.24, so code calling numpy-2-only API passed CI and failed on
# every environment the manifest actually promised to support. The
# "minimum" job pins the declared dependency FLOOR so the contract is
# tested, not assumed.
#
# The data-manifest tests re-hash all of data_raw/ (~20 MB, committed), so a
# green run certifies code AND dataset integrity together.
name: tests

on: [push, pull_request]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
            deps: minimum   # the declared floor: numpy 1.24 / scipy 1.10
          - python-version: "3.9"
            deps: latest
          - python-version: "3.11"
            deps: latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: pin declared minimum dependencies
        if: matrix.deps == 'minimum'
        run: pip install "numpy==1.24.4" "scipy==1.10.1"
      - run: pytest -q --runslow   # CI runs the full battery incl. slow closure tests
